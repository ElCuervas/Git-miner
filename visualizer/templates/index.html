<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Miner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:        #0a0c0f;
    --surface:   #111418;
    --border:    #1e2530;
    --accent:    #00e5ff;
    --accent2:   #ff3d71;
    --accent3:   #a259ff;
    --text:      #e8edf5;
    --muted:     #4a5568;
    --mono:      'Space Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grid noise texture ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }

  .layout {
    position: relative; z-index: 1;
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
    padding: 0 clamp(16px, 3vw, 40px);
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .brand {
    display: flex; align-items: center; gap: 12px;
  }

  .brand-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    flex-shrink: 0;
    animation: pulse-hex 3s ease-in-out infinite;
  }

  @keyframes pulse-hex {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.7; transform: scale(0.92); }
  }

  .brand h1 {
    font-size: clamp(14px, 2vw, 18px);
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }

  .brand h1 span { color: var(--accent); }

  .header-controls {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }

  .control-group {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: var(--mono);
    font-size: 13px;
  }

  .control-group label { color: var(--muted); white-space: nowrap; }

  .control-group input[type=range] {
    -webkit-appearance: none;
    width: 90px; height: 3px;
    background: var(--border);
    border-radius: 2px; outline: none; cursor: pointer;
  }

  .control-group input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
  }

  #n-val {
    color: var(--accent);
    min-width: 24px;
    text-align: right;
    font-weight: 700;
  }

  .live-dot {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    animation: blink 1.4s step-start infinite;
  }

  .dot.connected { background: #00e676; }

  @keyframes blink { 50% { opacity: 0; } }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex; gap: 20px; flex-wrap: wrap;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }

  .stat {
    display: flex; flex-direction: column; gap: 2px;
  }

  .stat-label {
    font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted);
  }

  .stat-value {
    font-family: var(--mono); font-size: 20px; font-weight: 700;
    color: var(--accent);
    transition: color 0.3s;
  }

  .stat-value.updated { color: var(--accent3); }

  /* ── Main grid ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 20px;
    padding: 20px 0 30px;
    align-items: start;
  }

  @media (max-width: 800px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* ── Panel ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .panel-title {
    font-family: var(--mono); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted);
  }

  .panel-badge {
    font-family: var(--mono); font-size: 10px;
    background: rgba(0,229,255,0.08);
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 4px;
    padding: 2px 7px;
  }

  /* ── Chart ── */
  .chart-wrap {
    padding: 16px;
    height: 420px;
    position: relative;
  }

  /* ── Table ── */
  .table-wrap {
    max-height: 480px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }

  thead th {
    position: sticky; top: 0;
    background: var(--surface);
    padding: 10px 14px;
    text-align: left;
    color: var(--muted);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 10px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid rgba(30,37,48,0.6);
    transition: background 0.15s;
    animation: row-in 0.3s ease both;
  }

  @keyframes row-in {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  tbody tr:hover { background: rgba(255,255,255,0.03); }

  td {
    padding: 9px 14px;
    vertical-align: middle;
  }

  .rank-cell {
    color: var(--muted);
    width: 36px;
  }

  .rank-cell.top3 { color: var(--accent); font-weight: 700; }

  .word-cell { color: var(--text); font-weight: 700; }

  .bar-cell { width: 110px; }

  .bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    transition: width 0.5s ease;
  }

  .score-cell {
    text-align: right;
    color: var(--accent);
  }

  /* ── Empty state ── */
  .empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 10px;
    padding: 60px 20px;
    color: var(--muted);
    font-family: var(--mono); font-size: 13px;
  }

  .empty svg { opacity: 0.3; }

  /* ── Footer ── */
  footer {
    padding: 14px 0;
    border-top: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }

  #last-update { color: var(--accent3); }
</style>
</head>
<body>
<div class="layout">

  <header>
    <div class="brand">
      <div class="brand-icon"></div>
      <h1>GitHub Miner</h1>
    </div>
    <div class="header-controls">
      <div class="control-group">
        <label>TOP-N</label>
        <input type="range" id="n-slider" min="5" max="50" value="20" step="5">
        <span id="n-val">20</span>
      </div>
    </div>
  </header>

  <div>
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-label">Palabras únicas</span>
        <span class="stat-value" id="stat-unique">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Top-N mostrado</span>
        <span class="stat-value" id="stat-topn">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">#1 palabra</span>
        <span class="stat-value" id="stat-top1">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Frecuencia #1</span>
        <span class="stat-value" id="stat-score1">—</span>
      </div>
    </div>

    <div class="main-grid">

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Frecuencia de palabras</span>
        </div>
        <div class="chart-wrap">
          <canvas id="bar-chart"></canvas>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Ranking detallado</span>
          <span class="panel-badge" id="table-badge">—</span>
        </div>
        <div class="table-wrap" id="table-wrap">
          <div class="empty">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
            </svg>
            Esperando datos del miner…
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let topN    = 20;
let evtSrc  = null;
let chart   = null;
let ranking = [];

const ctx = document.getElementById('bar-chart').getContext('2d');

function buildGradient(ctx, chartArea) {
  const g = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
  g.addColorStop(0,   'rgba(162,89,255,0.95)');
  g.addColorStop(0.5, 'rgba(0,229,255,0.7)');
  g.addColorStop(1,   'rgba(0,229,255,0.3)');
  return g;
}

chart = new Chart(ctx, {
  type: 'bar',
  data: {
    labels: [],
    datasets: [{
      label: 'Frecuencia',
      data: [],
      backgroundColor: function(ctx) {
        const chart = ctx.chart;
        const {ctx: c, chartArea} = chart;
        if (!chartArea) return 'rgba(0,229,255,0.5)';
        return buildGradient(c, chartArea);
      },
      borderColor: 'rgba(0,229,255,0.3)',
      borderWidth: 1,
      borderRadius: 4,
      borderSkipped: false,
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 500 },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#111418',
        borderColor: '#1e2530',
        borderWidth: 1,
        titleColor: '#00e5ff',
        bodyColor: '#e8edf5',
        bodyFont: { family: 'Space Mono', size: 12 },
        titleFont: { family: 'Space Mono', size: 11 },
        callbacks: {
          label: (ctx) => `  ${ctx.parsed.x.toLocaleString()} apariciones`
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(30,37,48,0.8)' },
        ticks: { color: '#4a5568', font: { family: 'Space Mono', size: 10 } }
      },
      y: {
        grid: { display: false },
        ticks: { color: '#e8edf5', font: { family: 'Space Mono', size: 11 }, padding: 6 }
      }
    }
  }
});


function renderChart(data) {
  const labels = data.map(d => d.word);
  const scores = data.map(d => d.score);
  chart.data.labels  = labels;
  chart.data.datasets[0].data = scores;
  chart.update('active');
}

function renderTable(data) {
  const wrap = document.getElementById('table-wrap');
  if (!data.length) {
    wrap.innerHTML = `<div class="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
      </svg>
      Esperando datos del miner…</div>`;
    return;
  }
  const max = data[0].score;
  const rows = data.map((d, i) => {
    const pct = max > 0 ? (d.score / max * 100).toFixed(1) : 0;
    const rankClass = i < 3 ? 'top3' : '';
    return `<tr>
      <td class="rank-cell ${rankClass}">#${i+1}</td>
      <td class="word-cell">${d.word}</td>
      <td class="bar-cell">
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </td>
      <td class="score-cell">${d.score.toLocaleString()}</td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table>
    <thead><tr>
      <th>#</th><th>Palabra</th><th>Barra</th><th>Frec.</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function updateStats(payload) {
  const flash = (id) => {
    const el = document.getElementById(id);
    el.classList.add('updated');
    setTimeout(() => el.classList.remove('updated'), 600);
  };

  document.getElementById('stat-unique').textContent = (payload.total_unique || 0).toLocaleString();
  document.getElementById('stat-topn').textContent   = payload.top_n || topN;
  if (payload.ranking.length) {
    document.getElementById('stat-top1').textContent  = payload.ranking[0].word;
    document.getElementById('stat-score1').textContent = payload.ranking[0].score.toLocaleString();
  }
  flash('stat-unique');

  const now = new Date();
  document.getElementById('last-update').textContent =
    now.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('table-badge').textContent = `${payload.ranking.length} palabras`;
}


function connect() {
  if (evtSrc) { evtSrc.close(); }

  evtSrc = new EventSource(`/stream?n=${topN}`);
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');

  evtSrc.onopen = () => {
    dot.classList.add('connected');
    text.textContent = 'en vivo';
  };

  evtSrc.onmessage = (e) => {
    try {
      const payload = JSON.parse(e.data);
      if (payload.error) { console.warn('Redis error:', payload.error); return; }
      ranking = payload.ranking;
      renderChart(ranking.slice().reverse());
      renderTable(ranking);
      updateStats(payload);
    } catch(err) { console.error(err); }
  };

  evtSrc.onerror = () => {
    dot.classList.remove('connected');
    text.textContent = 'reconectando…';
    evtSrc.close();
    setTimeout(connect, 3000);
  };
}


const slider = document.getElementById('n-slider');
const nVal   = document.getElementById('n-val');

slider.addEventListener('input', () => {
  topN = parseInt(slider.value);
  nVal.textContent = topN;
});

slider.addEventListener('change', () => {
  connect();
});

connect();
</script>
</body>
</html>
